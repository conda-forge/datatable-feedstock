{% set name = "datatable" %}
{% set version = "1.1.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/datatable-{{ version }}.tar.gz
  sha256: 8a9f6953ef6b02ede3d7c490f17d5c18c9b1bf2d58dd5451a8cac40ed887d775

build:
  number: 0
  skip: true  # [py<35 or win]

# numpy and pandas are _optional_ dependencies of dataframe
requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - pip
    - python
  run:
    - python

test:
  imports:
    - datatable
  files:
    - setup.cfg
  source_files:
    - src
    - tests
    - tests_random
    - LICENSE
  commands:
    - rm tests/test-docs.py
    - pytest tests -k 'not test_fread_from_cmd2 and not test_dt_version'
  requires:
    - pip
    - numpy
    - pandas
    - xlrd
    - pytest >=3.1
    - pytest-cov
    - docutils >=0.14

about:
  home: https://github.com/h2oai/datatable
  summary: Python library for fast multi-threaded data manipulation and munging.
  license: MPL-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
