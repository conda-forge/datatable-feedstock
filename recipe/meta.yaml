{% set name = "datatable" %}
{% set version = "1.1.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/datatable-{{ version }}.tar.gz
  sha256: 8a9f6953ef6b02ede3d7c490f17d5c18c9b1bf2d58dd5451a8cac40ed887d775

build:
  number: 0
  skip: true  # [py>312 or win]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
  host:
    - pip
    - python
    - setuptools
  run:
    - python

test:
  imports:
    - datatable
  files:
    - setup.cfg
  source_files:
    - src
    - tests
    - tests_random
    - LICENSE
  commands:
    - rm tests/test-docs.py
    - pytest tests
  requires:
    - pip
    # requirements_extra.txt
    - numpy
    - pandas
    - pyarrow
    - xlrd <=1.2.0
    # requirements_docs.txt
    - docutils >=0.15
    - pygments >=2.6
    - sphinx >=4.0,<5.0
    - sphinx_rtd_theme >=0.5
    - nbsphinx >=0.5
    # requirements_tests.txt
    - pytest >=3.1
    - pytest-cov

about:
  home: https://github.com/h2oai/datatable
  summary: Python library for fast multi-threaded data manipulation and munging.
  license: MPL-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - xylar
